# Example: ambient node proxy fronting ~10k micro-VM tenants with water-fill load shedding.
# - Below 80% heap: no interference.
# - 80%..90% heap: the scaled trigger ramps envoy.overload_actions.shed_tenant_load from 0 to
#   1; the ip_load_shed filter sheds new streams from the heaviest source IPs first.
# - At 90% heap: stop_accepting_requests rejects everything (process-wide backstop) and the
#   water level reaches 0.
overload_manager:
  refresh_interval: 0.25s
  resource_monitors:
  - name: envoy.resource_monitors.fixed_heap
    typed_config:
      "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
      max_heap_size_bytes: 2147483648  # 2 GiB
  actions:
  - name: envoy.overload_actions.shed_tenant_load
    triggers:
    - name: envoy.resource_monitors.fixed_heap
      scaled:
        scaling_threshold: 0.80
        saturation_threshold: 0.90
  - name: envoy.overload_actions.stop_accepting_requests
    triggers:
    - name: envoy.resource_monitors.fixed_heap
      threshold:
        value: 0.90

static_resources:
  listeners:
  - name: ingress
    address:
      socket_address: { address: 0.0.0.0, port_value: 10000 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          http_filters:
          - name: envoy.filters.http.ip_load_shed
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ip_load_shed.v3.IpLoadShed
              overload_action_name: envoy.overload_actions.shed_tenant_load
              # Fallback pressure source if the action above is not configured:
              max_heap_size_bytes: 2147483648
              evaluation_interval: 0.1s
              stream_cost_bytes: 65536
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          route_config:
            virtual_hosts:
            - name: all
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                route: { cluster: upstream }
  clusters:
  - name: upstream
    connect_timeout: 1s
    type: STRICT_DNS
    load_assignment:
      cluster_name: upstream
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: 127.0.0.1, port_value: 8080 }
